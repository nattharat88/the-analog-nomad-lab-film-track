<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track | The Analog Nomad Film Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #d6d2c9; --paper-color: #e8e4da; --text-color: #4a453f; --accent-color: #8c7863; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Special Elite', 'Sarabun', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png'); }
        .container { background: var(--paper-color); padding: 30px; border: 1px solid #b5ada2; max-width: 450px; width: 100%; box-shadow: 10px 10px 0px rgba(0,0,0,0.05); box-sizing: border-box; }
        h1 { font-size: 20px; text-align: center; border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; background: rgba(255,255,255,0.5); font-family: 'Sarabun'; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; }
        button { background: var(--accent-color); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-family: 'Special Elite'; font-size: 18px; transition: 0.3s; }
        button:disabled { background: #ccc; }
        
        #result { display: none; margin-top: 25px; border-top: 2px dashed var(--accent-color); padding-top: 20px; }
        .status-card { background: white; padding: 20px; border: 1px solid #ddd; margin-top: 15px; }
        .label { font-size: 12px; color: var(--accent-color); font-weight: bold; margin-bottom: 4px; display: block; }
        .value { font-family: 'Sarabun'; font-size: 15px; margin-bottom: 15px; display: block; line-height: 1.4; }
        
        .note-container { position: relative; background: #fdfdfd; padding: 10px; border: 1px dotted #ccc; margin-bottom: 15px; }
        .edit-btn { background: #5a554f; color: white; font-size: 11px; padding: 5px 10px; cursor: pointer; display: inline-block; margin-top: 5px; width: auto; font-family: 'Sarabun'; border: none; }
        
        .status-waiting { color: #e67e22; font-weight: bold; }
        .status-scanning { color: #3498db; font-weight: bold; }
        .status-completed { color: #27ae60; font-weight: bold; }
        .track-link-btn { background: #4a453f; color: white; padding: 15px; text-decoration: none; display: block; text-align: center; margin-top: 15px; font-size: 16px; border: 1px solid #333; }
        .file-link { color: #8c7863; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h1>THE ANALOG NOMAD</h1>
    <p style="text-align: center; font-size: 11px; margin-top: -15px; margin-bottom: 20px;">— TRACKING STATUS —</p>

    <input type="text" id="orderIdInput" placeholder="กรอกเลข ORDER ID">
    <button onclick="trackStatus()" id="checkBtn">CHECK STATUS</button>

    <div id="result">
        <div class="status-card">
            <span class="label">FILM LIST:</span>
            <span id="resFilm" class="value"></span>

            <span class="label">NOTE:</span>
            <div class="note-container">
                <span id="resNote" class="value" style="margin-bottom: 5px;">-</span>
                <button id="editNoteBtn" class="edit-btn" onclick="toggleEditNote()">แก้ไข Note</button>
                <div id="editArea" style="display:none;">
                    <textarea id="noteInput" rows="2" style="width:100%; margin-top:5px; font-family:'Sarabun';"></textarea>
                    <button class="edit-btn" style="background:#27ae60;" onclick="saveNote()">บันทึก</button>
                    <button class="edit-btn" style="background:#a34b4b;" onclick="toggleEditNote()">ยกเลิก</button>
                </div>
            </div>

            <span class="label">PAYMENT:</span>
            <span id="resPayment" class="value"></span>

            <span class="label">LAB STATUS:</span>
            <span id="resStatus" class="value"></span>

            <span class="label">FILE LINK:</span>
            <span id="resFileLink" class="value"></span>

            <span class="label">เลขพัสดุ:</span>
            <span id="resTracking" class="value"></span>
        </div>
    </div>

    <a href="order.html" class="track-link-btn" style="background: transparent; color: #4a453f; border-color: #4a453f;">กลับหน้าสั่งงาน (Order)</a>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxwS6bBsIyuvbn6eCaTKLRhsB_Bz_9DwAKC9k84_vhPYeqWpy-vVJOb2ToSTzQDPLfr/exec';
    let currentOrderId = "";

    async function trackStatus() {
        const id = document.getElementById('orderIdInput').value;
        const btn = document.getElementById('checkBtn');
        if(!id) return alert('กรุณากรอกเลข ID');
        
        currentOrderId = id;
        btn.innerText = "SEARCHING..."; btn.disabled = true;
        document.getElementById('result').style.display = 'none';

        try {
            const response = await fetch(`${SCRIPT_URL}?id=${id}`);
            const data = await response.json();
            
            if(data.result === 'found') {
                document.getElementById('resFilm').innerText = data.filmName;
                document.getElementById('resNote').innerText = data.note || "ไม่มีหมายเหตุ";
                document.getElementById('noteInput').value = data.note || "";
                
                const payEl = document.getElementById('resPayment');
                payEl.innerText = data.payment;
                payEl.style.color = data.payment === "Paid" ? "green" : "#a34b4b";

                const statEl = document.getElementById('resStatus');
                statEl.innerText = data.status;
                statEl.className = "value " + (
                    data.status === "Waiting for Pickup" ? "status-waiting" : 
                    data.status === "Scanning" ? "status-scanning" : 
                    data.status === "Completed" ? "status-completed" : ""
                );

                // แยกช่อง File Link (คอลัมน์ H)
                const fileEl = document.getElementById('resFileLink');
                if (data.fileLink && data.fileLink.trim() !== "") {
                    fileEl.innerHTML = `<a href="${data.fileLink}" target="_blank" class="file-link">คลิกเพื่อโหลดรูปภาพ</a>`;
                } else {
                    fileEl.innerText = "กำลังรอดำเนินการ";
                    fileEl.style.color = "#999";
                }

                // แยกช่อง Tracking (คอลัมน์ I)
                const trackEl = document.getElementById('resTracking');
                if (data.trackingNo && data.trackingNo.trim() !== "") {
                    trackEl.innerText = data.trackingNo;
                    trackEl.style.color = "green";
                    trackEl.style.fontWeight = "bold";
                } else {
                    trackEl.innerText = "รอจัดส่ง";
                    trackEl.style.color = "#a34b4b";
                }

                document.getElementById('result').style.display = 'block';
            } else { alert('ไม่พบข้อมูลครับ'); }
        } catch(e) { alert('Error: ' + e); }
        btn.innerText = "CHECK STATUS"; btn.disabled = false;
    }

    function toggleEditNote() {
        const area = document.getElementById('editArea');
        const text = document.getElementById('resNote');
        const btn = document.getElementById('editNoteBtn');
        const isEditing = area.style.display === 'none';
        area.style.display = isEditing ? 'block' : 'none';
        text.style.display = isEditing ? 'none' : 'block';
        btn.style.display = isEditing ? 'none' : 'block';
    }

    async function saveNote() {
        const newNote = document.getElementById('noteInput').value;
        if(!confirm('ยืนยันการแก้ไข Note หรือไม่?')) return;
        
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    orderId: currentOrderId,
                    newNote: newNote
                })
            });
            alert('อัปเดต Note เรียบร้อยแล้วครับ!');
            document.getElementById('resNote').innerText = newNote || "ไม่มีหมายเหตุ";
            toggleEditNote();
        } catch(e) { alert('บันทึกไม่สำเร็จ'); }
    }
</script>
</body>
</html>
