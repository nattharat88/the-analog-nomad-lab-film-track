<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Kanit', sans-serif;
      background-color: #222222; /* สีพื้นหลังมืดแบบเดิม */
      color: #ffffff;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background-color: #333333;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h2 { margin-bottom: 25px; font-weight: 400; letter-spacing: 1px; }
    
    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 8px;
      background-color: #444444;
      color: white;
      font-family: 'Kanit', sans-serif;
      box-sizing: border-box;
      text-align: center;
    }
    
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background-color: #ffffff;
      color: #222222;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Kanit', sans-serif;
      transition: 0.3s;
    }
    button:hover { background-color: #dddddd; }

    .result-card {
      margin-top: 25px;
      text-align: left;
      background: #444444;
      padding: 20px;
      border-radius: 10px;
      display: none;
    }
    
    .item { margin-bottom: 15px; border-bottom: 1px solid #555; padding-bottom: 10px; }
    .item:last-child { border-bottom: none; }
    .label { font-size: 12px; color: #aaaaaa; display: block; margin-bottom: 4px; }
    .value { font-size: 16px; color: #ffffff; }
    .status-highlight { color: #f39c12; font-weight: bold; }

    /* ส่วนของ Note */
    .note-box {
      background: #333;
      padding: 8px;
      border-radius: 5px;
      font-size: 14px;
      margin-top: 5px;
      border-left: 3px solid #ffffff;
      color: #ddd;
    }
    textarea {
      width: 100%;
      height: 60px;
      background: #222;
      color: white;
      border: 1px solid #666;
      border-radius: 5px;
      padding: 8px;
      font-family: 'Kanit', sans-serif;
      box-sizing: border-box;
      margin-top: 5px;
    }
    .btn-small {
      width: auto;
      padding: 4px 12px;
      font-size: 12px;
      margin-top: 8px;
      margin-right: 5px;
    }
    .btn-edit-note { background: none; color: #aaa; text-decoration: underline; font-size: 12px; width: auto; padding: 0; display: inline; cursor: pointer; }
    
    a { color: #3498db; text-decoration: none; }
  </style>
</head>
<body>

<div class="container">
  <h2>Track Status</h2>
  <input type="text" id="orderId" placeholder="กรอก Order ID เช่น TAN888">
  <button onclick="checkStatus()">ตรวจสอบสถานะ</button>

  <div id="result" class="result-card">
    <div class="item">
      <span class="label">ชื่อฟิล์ม / รายละเอียด</span>
      <span class="value" id="resFilm"></span>
      <div id="noteContainer">
        <div id="noteDisplay" class="note-box"></div>
        <div id="noteEditArea" style="display:none;">
          <textarea id="noteInput"></textarea>
          <button class="btn-small" onclick="saveNote()">บันทึก</button>
          <button class="btn-small" style="background:#666; color:white;" onclick="toggleEdit(false)">ยกเลิก</button>
        </div>
        <div id="editBtn" class="btn-edit-note" onclick="toggleEdit(true)">[ แก้ไขหมายเหตุ ]</div>
      </div>
    </div>

    <div class="item"><span class="label">การชำระเงิน</span><span class="value" id="resPayment"></span></div>
    <div class="item"><span class="label">สถานะการล้าง</span><span class="value status-highlight" id="resStatus"></span></div>
    <div class="item"><span class="label">ลิงก์ดาวน์โหลดรูป</span><span class="value" id="resLink"></span></div>
    <div class="item"><span class="label">เลขพัสดุ (ส่งฟิล์มคืน)</span><span class="value" id="resTracking"></span></div>
  </div>
</div>

<script>
  var currentData = null;

  function checkStatus() {
    var id = document.getElementById('orderId').value;
    if(!id) return;
    
    google.script.run.withSuccessHandler(function(data) {
      if(data) {
        currentData = data;
        document.getElementById('resFilm').innerText = data.filmName;
        document.getElementById('noteDisplay').innerText = data.note || "- ไม่มีหมายเหตุ -";
        document.getElementById('noteInput').value = data.note;
        document.getElementById('resPayment').innerText = data.payment;
        document.getElementById('resStatus').innerText = data.status;
        document.getElementById('resLink').innerHTML = data.fileLink.includes('http') ? '<a href="'+data.fileLink+'" target="_blank">คลิกเพื่อรับไฟล์</a>' : data.fileLink;
        document.getElementById('resTracking').innerText = data.tracking || "รอการจัดส่ง";
        document.getElementById('result').style.display = 'block';
      } else {
        alert("ไม่พบรหัสออเดอร์นี้");
      }
    }).getStatus(id);
  }

  function toggleEdit(isEdit) {
    document.getElementById('noteDisplay').style.display = isEdit ? 'none' : 'block';
    document.getElementById('editBtn').style.display = isEdit ? 'none' : 'block';
    document.getElementById('noteEditArea').style.display = isEdit ? 'block' : 'none';
  }

  function saveNote() {
    var newNote = document.getElementById('noteInput').value;
    google.script.run.withSuccessHandler(function(msg) {
      document.getElementById('noteDisplay').innerText = newNote || "- ไม่มีหมายเหตุ -";
      toggleEdit(false);
    }).updateNoteInSheet(currentData.row, newNote);
  }
</script>

</body>
</html>
