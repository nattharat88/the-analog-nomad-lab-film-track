<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order | The Analog Nomad</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Sarabun:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #d6d2c9; /* เทาน้ำตาลซีด */
            --paper-color: #e8e4da;
            --text-color: #4a453f;
            --accent-color: #8c7863;
            --border-color: #b5ada2;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Special Elite', 'Sarabun', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png'); /* เพิ่ม Texture กระดาษเก่า */
        }

        .container {
            background: var(--paper-color);
            padding: 40px;
            border: 1px solid var(--border-color);
            box-shadow: 10px 10px 0px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
            padding-bottom: 10px;
        }

        .search-box {
            margin-bottom: 30px;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--accent-color);
            padding: 10px;
            font-family: 'Special Elite', monospace;
            font-size: 18px;
            text-align: center;
            outline: none;
            width: 80%;
            color: var(--text-color);
        }

        button {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 20px;
            cursor: pointer;
            font-family: 'Special Elite', monospace;
            transition: 0.3s;
        }

        button:hover {
            background: #6f5e4d;
        }

        #result {
            margin-top: 30px;
            text-align: left;
            display: none;
            border-top: 1px dashed var(--border-color);
            padding-top: 20px;
        }

        .status-item {
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }

        .status-label { font-weight: bold; text-transform: uppercase; font-size: 14px; }
        .status-value { color: #6b5a4a; }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            opacity: 0.6;
        }

        /* สำหรับหน้าจอเล็ก */
        @media (max-width: 480px) {
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>The Analog Nomad</h1>
        <p style="font-size: 14px;">— FILM TRACKING SYSTEM —</p>
        
        <div class="search-box">
            <input type="text" id="orderInput" placeholder="ENTER ORDER NO. (e.g. 001)">
            <br>
            <button onclick="trackOrder()">SEARCH</button>
        </div>

        <div id="result">
            <div class="status-item">
                <span class="status-label">Order Number:</span>
                <span id="res-id" class="status-value">-</span>
            </div>
            <div class="status-item">
                <span class="status-label">Film:</span>
                <span id="res-film" class="status-value">-</span>
            </div>
            <div class="status-item">
                <span class="status-label">Payment:</span>
                <span id="res-payment" class="status-value">-</span>
            </div>
            <div class="status-item">
                <span class="status-label">Developing:</span>
                <span id="res-dev" class="status-value">-</span>
            </div>
            <div class="status-item">
                <span class="status-label">Scanning:</span>
                <span id="res-scan" class="status-value">-</span>
            </div>
            <div class="status-item">
                <span class="status-label">Delivery:</span>
                <span id="res-del" class="status-value">-</span>
            </div>
        </div>

        <p id="error" style="color: #a34b4b; display: none; font-size: 14px;">Order not found. Please check your ID.</p>
    </div>

    <div class="footer">
        © 2026 THE ANALOG NOMAD LAB.
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSyn18h4wHPHdv6qpdu_0n5rwiPqLrBB_TZMwi65PjyJo2M8RSmWi83iSUHsoXbjHVS4uXBdzgLYI1z/pub?gid=369962220&single=true&output=csv';

        async function trackOrder() {
            const orderId = document.getElementById('orderInput').value.trim();
            const resultDiv = document.getElementById('result');
            const errorP = document.getElementById('error');
            
            if (!orderId) return;

            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split(','));

                // ค้นหาแถวที่มี OrderNumber ตรงกับที่ลูกค้ากรอก
                const orderData = rows.find(row => row[0].trim() === orderId);

                if (orderData) {
                    document.getElementById('res-id').innerText = orderData[0];
                    document.getElementById('res-payment').innerText = orderData[1];
                    document.getElementById('res-film').innerText = orderData[2];
                    document.getElementById('res-dev').innerText = orderData[3];
                    document.getElementById('res-scan').innerText = orderData[4];
                    document.getElementById('res-del').innerText = orderData[5];
                    
                    resultDiv.style.display = 'block';
                    errorP.style.display = 'none';
                } else {
                    resultDiv.style.display = 'none';
                    errorP.style.display = 'block';
                }
            } catch (err) {
                console.error("Error fetching data:", err);
                alert("ระบบขัดข้อง กรุณาลองใหม่ภายหลัง");
            }
        }
    </script>
</body>
</html>
