<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #dcd7c9; padding: 20px; display: flex; justify-content: center; }
    .container { background: #f1ede3; border: 1px solid #a39e93; width: 100%; max-width: 450px; padding: 20px; box-shadow: 5px 5px 0px #a39e93; }
    h2 { text-align: center; color: #3f3f3f; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid #3f3f3f; padding-bottom: 10px; }
    .input-group { margin-bottom: 20px; text-align: center; }
    input[type="text"] { width: 80%; padding: 10px; border: 1px solid #ccc; margin-bottom: 10px; font-size: 16px; }
    button { background: #8d7b68; color: white; border: none; padding: 10px 20px; cursor: pointer; width: 85%; font-size: 16px; text-transform: uppercase; }
    button:hover { background: #706253; }
    .result-card { background: white; border: 1px solid #eee; padding: 15px; margin-top: 20px; display: none; }
    .item { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 14px; }
    .label { font-weight: bold; color: #333; }
    .status-val { color: #e67e22; font-weight: bold; }
    .note-section { background: #fffcf0; padding: 10px; border: 1px dashed #ccc; margin-top: 5px; }
    textarea { width: 100%; height: 60px; margin-top: 5px; border: 1px solid #ddd; font-family: inherit; padding: 5px; box-sizing: border-box; }
    .btn-edit { background: #5a5a5a; font-size: 12px; padding: 5px 10px; width: auto; margin-top: 5px; }
    .footer-btn { background: #e0ddd5; color: #555; border: 1px solid #ccc; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Track Status</h2>
    <div class="input-group">
      <input type="text" id="orderId" placeholder="กรอก Order ID (เช่น ABNXXXXX)">
      <button onclick="checkStatus()">Check Status</button>
    </div>

    <div id="result" class="result-card">
      <div class="item"><span class="label">ฟิล์ม:</span> <br><span id="resFilm"></span></div>
      
      <div class="item">
        <span class="label">หมายเหตุ (Note):</span>
        <div id="noteDisplay" class="note-section"></div>
        <div id="noteEditArea" style="display:none;">
          <textarea id="noteInput"></textarea>
          <button class="btn-edit" onclick="saveNote()">บันทึกการแก้ไข</button>
          <button class="btn-edit" style="background:#ccc;" onclick="toggleEdit(false)">ยกเลิก</button>
        </div>
        <button id="editBtn" class="btn-edit" onclick="toggleEdit(true)">แก้ไข Note</button>
      </div>

      <div class="item"><span class="label">การชำระเงิน:</span> <span id="resPayment"></span></div>
      <div class="item"><span class="label">สถานะงาน:</span> <span id="resStatus" class="status-val"></span></div>
      <div class="item"><span class="label">ลิงก์ส่งไฟล์:</span> <br><span id="resLink"></span></div>
      <div class="item"><span class="label">เลขพัสดุ:</span> <br><span id="resTracking" style="color:#a67c52;"></span></div>
    </div>
    
    <button class="footer-btn" onclick="window.location.reload()">กลับไปหน้าสั่งล้างฟิล์ม (Order)</button>
  </div>

  <script>
    var currentData = null;

    function checkStatus() {
      var id = document.getElementById('orderId').value;
      if(!id) return alert("กรุณากรอก Order ID");
      
      document.getElementById('result').style.display = 'none';
      
      google.script.run.withSuccessHandler(function(data) {
        if(data) {
          currentData = data;
          document.getElementById('resFilm').innerText = data.filmName;
          document.getElementById('noteDisplay').innerText = data.note || "- ไม่มีข้อความ -";
          document.getElementById('noteInput').value = data.note;
          document.getElementById('resPayment').innerText = data.payment;
          document.getElementById('resStatus').innerText = data.status;
          document.getElementById('resLink').innerHTML = data.fileLink.includes('http') ? '<a href="'+data.fileLink+'" target="_blank">คลิกเพื่อดูไฟล์</a>' : data.fileLink;
          document.getElementById('resTracking').innerText = data.tracking || "รอจัดส่งฟิล์ม Negative";
          document.getElementById('result').style.display = 'block';
        } else {
          alert("ไม่พบข้อมูล Order ID นี้ครับ");
        }
      }).getStatus(id);
    }

    function toggleEdit(isEdit) {
      document.getElementById('noteDisplay').style.display = isEdit ? 'none' : 'block';
      document.getElementById('editBtn').style.display = isEdit ? 'none' : 'inline-block';
      document.getElementById('noteEditArea').style.display = isEdit ? 'block' : 'none';
    }

    function saveNote() {
      var newNote = document.getElementById('noteInput').value;
      google.script.run.withSuccessHandler(function(msg) {
        alert(msg);
        document.getElementById('noteDisplay').innerText = newNote || "- ไม่มีข้อความ -";
        toggleEdit(false);
      }).updateNoteInSheet(currentData.row, newNote);
    }
  </script>
</body>
</html>
