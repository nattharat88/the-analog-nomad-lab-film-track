<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Status | The Analog Nomad</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #d6d2c9; --paper-color: #e8e4da; --text-color: #4a453f; --accent-color: #8c7863; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Special Elite', 'Sarabun', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png'); }
        .container { background: var(--paper-color); padding: 30px; border: 1px solid #b5ada2; max-width: 450px; width: 100%; box-shadow: 10px 10px 0px rgba(0,0,0,0.05); }
        h1 { font-size: 22px; text-align: center; border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; background: rgba(255,255,255,0.5); font-family: 'Sarabun'; box-sizing: border-box; font-size: 18px; text-align: center; margin-bottom: 15px; }
        button { background: var(--accent-color); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-family: 'Special Elite'; font-size: 18px; }
        
        #result { margin-top: 25px; padding: 15px; border: 1px solid var(--accent-color); display: none; background: white; text-align: left; }
        .status-item { margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; font-family: 'Sarabun'; line-height: 1.6; }
        .label { font-weight: bold; font-size: 14px; color: var(--accent-color); display: block; margin-bottom: 4px; }
        
        /* สีกำกับสถานะงานตาม Google Sheet */
        .status-waiting { background-color: #fce5cd; color: #b45f06; padding: 2px 8px; border-radius: 4px; font-weight: bold; } /* ส้มอ่อน */
        .status-scanning { background-color: #cfe2f3; color: #0b5394; padding: 2px 8px; border-radius: 4px; font-weight: bold; } /* ฟ้าอ่อน */
        .status-completed { background-color: #d9ead3; color: #38761d; padding: 2px 8px; border-radius: 4px; font-weight: bold; } /* เขียวอ่อน */
        .status-paid { color: #38761d; font-weight: bold; }
        .status-unpaid { color: #a34b4b; font-weight: bold; }

        /* ส่วนของ Note */
        .note-box { background: #f9f9f9; border: 1px dashed #ccc; padding: 10px; position: relative; }
        .edit-btn { background: #8c7863; color: white; border: none; padding: 4px 8px; font-size: 11px; cursor: pointer; font-family: 'Sarabun'; margin-top: 5px; }
        #noteTextarea { width: 100%; font-family: 'Sarabun'; padding: 5px; display: none; margin-top: 5px; }

        .track-btn { background: #4a453f; color: white; padding: 15px; text-decoration: none; display: block; text-align: center; margin-top: 20px; font-size: 16px; border: 1px solid #333; }
        .file-link { color: #0b5394; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <h1>TRACK STATUS</h1>
    <input type="text" id="orderIdInput" placeholder="กรอกเลข ORDER ID">
    <button onclick="trackStatus()" id="checkBtn">CHECK STATUS</button>
    
    <div id="result">
        <div class="status-item">
            <span class="label">FILM NAME:</span>
            <span id="resFilm"></span>
        </div>

        <div class="status-item">
            <span class="label">NOTE:</span>
            <div class="note-box">
                <span id="resNote">-</span>
                <textarea id="noteTextarea" rows="2"></textarea>
                <button id="editBtn" class="edit-btn" onclick="toggleEdit()">EDIT NOTE</button>
                <button id="saveBtn" class="edit-btn" style="display:none; background:#38761d;" onclick="saveNote()">SAVE</button>
            </div>
        </div>

        <div class="status-item">
            <span class="label">PAYMENT:</span>
            <span id="resPayment"></span>
        </div>

        <div class="status-item">
            <span class="label">LAB STATUS:</span>
            <span id="resStatus"></span>
        </div>

        <div class="status-item">
            <span class="label">FILE LINK:</span>
            <span id="resLink"></span>
        </div>

        <div class="status-item">
            <span class="label">TRACKING NO:</span>
            <span id="resTrack"></span>
        </div>
    </div>
    <a href="order.html" class="track-btn" style="background: transparent; color: #4a453f; border: 1px solid #4a453f;">BACK TO ORDER</a>
</div>

<script>
    // ดึง URL เดิมที่นัทใช้อยู่
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxwS6bBsIyuvbn6eCaTKLRhsB_Bz_9DwAKC9k84_vhPYeqWpy-vVJOb2ToSTzQDPLfr/exec';
    let currentOrderId = "";

    async function trackStatus() {
        const id = document.getElementById('orderIdInput').value;
        const btn = document.getElementById('checkBtn');
        if(!id) return alert('กรุณากรอกเลข ID');
        
        currentOrderId = id;
        btn.innerText = "SEARCHING..."; btn.disabled = true;
        document.getElementById('result').style.display = 'none';
        
        try {
            const response = await fetch(`${SCRIPT_URL}?id=${id}`);
            const data = await response.json();
            
            if(data.result === 'found') {
                document.getElementById('resFilm').innerText = data.filmName;
                document.getElementById('resNote').innerText = data.note || "No note";
                document.getElementById('noteTextarea').value = data.note || "";
                
                // Payment Status & Color
                const payEl = document.getElementById('resPayment');
                payEl.innerText = data.payment;
                payEl.className = data.payment === "Paid" ? "status-paid" : "status-unpaid";

                // Lab Status & Color (Match Google Sheet)
                const statEl = document.getElementById('resStatus');
                statEl.innerText = data.status;
                if(data.status === "Waiting for Pickup") statEl.className = "status-waiting";
                else if(data.status === "Scanning") statEl.className = "status-scanning";
                else if(data.status === "Completed") statEl.className = "status-completed";

                // File Link
                const linkEl = document.getElementById('resLink');
                if (data.fileLink && data.fileLink.trim() !== "") {
                    linkEl.innerHTML = `<a href="${data.fileLink}" target="_blank" class="file-link">Click to Download</a>`;
                } else { 
                    linkEl.innerText = "Processing..."; 
                    linkEl.style.color = "#999";
                }

                // Tracking
                const trackEl = document.getElementById('resTrack');
                if(data.trackingNo && data.trackingNo.trim() !== "") {
                    trackEl.innerText = data.trackingNo;
                    trackEl.style.color = "#38761d";
                    trackEl.style.fontWeight = "bold";
                } else {
                    trackEl.innerText = "Waiting for shipment";
                    trackEl.style.color = "#a34b4b";
                }
                
                document.getElementById('result').style.display = 'block';
            } else { alert('Order ID not found.'); }
        } catch(e) { alert('Error fetching data.'); }
        btn.innerText = "CHECK STATUS"; btn.disabled = false;
    }

    function toggleEdit() {
        const span = document.getElementById('resNote');
        const textarea = document.getElementById('noteTextarea');
        const editBtn = document.getElementById('editBtn');
        const saveBtn = document.getElementById('saveBtn');

        if (textarea.style.display === "none" || textarea.style.display === "") {
            span.style.display = "none";
            textarea.style.display = "block";
            editBtn.innerText = "CANCEL";
            saveBtn.style.display = "inline-block";
        } else {
            span.style.display = "block";
            textarea.style.display = "none";
            editBtn.innerText = "EDIT NOTE";
            saveBtn.style.display = "none";
        }
    }

    async function saveNote() {
        const newNote = document.getElementById('noteTextarea').value;
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerText = "SAVING...";
        saveBtn.disabled = true;

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    orderId: currentOrderId,
                    newNote: newNote
                })
            });
            const res = await response.json();
            if(res.result === "success") {
                alert("Note updated successfully!");
                document.getElementById('resNote').innerText = newNote || "No note";
                toggleEdit();
            } else { alert("Failed to save."); }
        } catch(e) { alert("Error connecting to server."); }
        
        saveBtn.innerText = "SAVE";
        saveBtn.disabled = false;
    }
</script>
</body>
</html>
